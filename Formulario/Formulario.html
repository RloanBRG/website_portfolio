<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        section{
            border: solid 1px gray;
            padding: 50px;
            border-radius: 5px;
        }

        div{
            display: flex;
            flex-direction: column;
        }

        input{
            border-radius: 5px;
            border: solid 1px gray;
            padding: 10px;
            margin-bottom: 5px;
        }
        button{
            padding: 5px 10px;
            border-radius: 5px;
            border: solid 1px gray;
            transition: .5s;
        }

        button:hover{
            background-color: lightgray;
            cursor: pointer;
        }

    </style>
</head>

<body>
    <section>    
        <form>
            <div>
                <label>Nome</label>
                <input type="text" placeholder="Nome" id="nome">
                <label>Curso</label>
                <input type="text" placeholder="Curso" id="curso">
            </div>
        </form>
        <button onclick="mostraDados()">Enviar</button>
    </section>

    <p id="dados"></p>

</body>

<script>
    function mostraDados(){
        let nome = document.getElementById("nome").value;
        let curso = document.getElementById("curso").value;

        document.getElementById("dados").innerHTML = 
        `
        <h3>Dados</h3>
        <p>Nome: ${nome}</p>
        <p>Cuso: ${curso}</p>
        `;
    }
</script>

</html>
